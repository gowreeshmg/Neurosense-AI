<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Clean, Rich Deep Indigo App Icon Background -->
    <linearGradient id="appBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#161E38" />
      <stop offset="100%" stop-color="#211A44" />
    </linearGradient>

    <!-- Vibrant Cyan-to-Purple Gradient for Brain / Mind Emblem -->
    <linearGradient id="emblemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#4FACFE" />
      <stop offset="100%" stop-color="#D946EF" />
    </linearGradient>

    <!-- Soundwave Center Pulse Gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FF61D2" />
    </linearGradient>

    <!-- Soft, Clean Drop Shadow for Depth -->
    <filter id="cleanShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.45" />
    </filter>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 1. Superellipse Rounded Rectangle Background (Exact iOS Radius) -->
  <rect x="0" y="0" width="512" height="512" rx="116" ry="116" fill="url(#appBg)" />

  <!-- Subtle Outer Rim Highlight for Clean App Border -->
  <rect x="2" y="2" width="508" height="508" rx="114" ry="114" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2" />

  <!-- 2. MAIN CENTER EMBLEM: Clean, Bold Stylized Brain Hemisphere + Soundwave -->
  <g filter="url(#cleanShadow)">
    
    <!-- LEFT BRAIN LOBE (Cognitive & Text Analysis) -->
    <!-- Sleek, organic curved outline representing the left hemisphere -->
    <path d="M 256 120 C 180 120, 120 176, 120 248 C 120 290, 142 328, 178 352 C 190 360, 196 374, 196 388 L 196 400 C 196 410, 206 418, 216 418 L 244 418 C 250 418, 256 412, 256 406 L 256 120 Z" 
          fill="none" stroke="url(#emblemGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Inner Cognitive Fold -->
    <path d="M 166 216 C 166 186, 194 166, 226 166" fill="none" stroke="url(#emblemGrad)" stroke-width="12" stroke-linecap="round" stroke-opacity="0.75" />
    <path d="M 160 270 C 176 296, 206 306, 230 300" fill="none" stroke="url(#emblemGrad)" stroke-width="12" stroke-linecap="round" stroke-opacity="0.75" />

    <!-- RIGHT BRAIN LOBE (Acoustic / Voice Analysis) -->
    <!-- Sleek, organic curved outline representing the right hemisphere -->
    <path d="M 256 120 C 332 120, 392 176, 392 248 C 392 290, 370 328, 334 352 C 322 360, 316 374, 316 388 L 316 400 C 316 410, 306 418, 296 418 L 268 418 C 262 418, 256 412, 256 406 L 256 120 Z" 
          fill="none" stroke="url(#emblemGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Right Side Inner Fold / Acoustic Bars -->
    <path d="M 346 216 C 346 186, 318 166, 286 166" fill="none" stroke="url(#emblemGrad)" stroke-width="12" stroke-linecap="round" stroke-opacity="0.75" />
    <path d="M 352 270 C 336 296, 306 306, 282 300" fill="none" stroke="url(#emblemGrad)" stroke-width="12" stroke-linecap="round" stroke-opacity="0.75" />

  </g>

  <!-- 3. CENTER DUAL-MODALITY SOUNDWAVE PULSE (Vocal Biomarkers Pulse Line) -->
  <!-- A clean, bold ECG/audio pulse line cutting right across the center axis -->
  <g filter="url(#softGlow)">
    <path d="M 140 248 L 206 248 L 226 200 L 256 304 L 286 192 L 306 248 L 372 248" 
          fill="none" stroke="url(#waveGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Bright Center Node -->
    <circle cx="256" cy="248" r="8" fill="#FFFFFF" />
  </g>

</svg>
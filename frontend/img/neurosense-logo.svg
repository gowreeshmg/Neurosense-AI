<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A101D" />
      <stop offset="50%" stop-color="#121C32" />
      <stop offset="100%" stop-color="#1A1838" />
    </linearGradient>

    <!-- Border Glow Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#4FACFE" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#D946EF" stop-opacity="0.6" />
    </linearGradient>

    <!-- Cyan Neural Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <!-- Purple/Pink Acoustic Wave Gradient -->
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4FACFE" />
      <stop offset="100%" stop-color="#9B51E0" />
    </linearGradient>
    
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#9B51E0" />
    </linearGradient>

    <linearGradient id="waveGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF61D2" />
      <stop offset="50%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#7F00FF" />
    </linearGradient>

    <!-- Center Fusion Spark Gradient -->
    <radialGradient id="sparkGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Main Rounded Squircle Background -->
  <rect x="16" y="16" width="480" height="480" rx="120" ry="120" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="4" />
  
  <!-- Subtle Inner Grid / Tech Circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2" stroke-dasharray="8 8" />
  <circle cx="256" cy="256" r="110" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5" />

  <!-- LEFT HEMISPHERE: NEURAL BRAIN NETWORK (CBT / COGNITIVE NLP) -->
  <g filter="url(#glow)">
    <!-- Interconnecting Neural Pathways -->
    <path d="M 150 200 L 210 160" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" stroke-opacity="0.85" />
    <path d="M 150 200 L 140 270" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" stroke-opacity="0.85" />
    <path d="M 140 270 L 190 320" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" stroke-opacity="0.85" />
    <path d="M 210 160 L 230 230" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" stroke-opacity="0.85" />
    <path d="M 140 270 L 230 230" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" stroke-opacity="0.85" />
    <path d="M 230 230 L 190 320" stroke="url(#cyanGrad)" stroke-width="6" stroke-linecap="round" stroke-opacity="0.85" />
    <path d="M 230 230 L 256 256" stroke="url(#cyanGrad)" stroke-width="5" stroke-linecap="round" stroke-dasharray="4 4" stroke-opacity="0.9" />

    <!-- Neural Nodes -->
    <circle cx="150" cy="200" r="13" fill="#00F2FE" />
    <circle cx="150" cy="200" r="6" fill="#FFFFFF" />

    <circle cx="210" cy="160" r="15" fill="#4FACFE" />
    <circle cx="210" cy="160" r="7" fill="#FFFFFF" />

    <circle cx="140" cy="270" r="16" fill="#00F2FE" />
    <circle cx="140" cy="270" r="7" fill="#FFFFFF" />

    <circle cx="190" cy="320" r="14" fill="#4FACFE" />
    <circle cx="190" cy="320" r="6" fill="#FFFFFF" />

    <circle cx="230" cy="230" r="12" fill="#00F2FE" />
    <circle cx="230" cy="230" r="5" fill="#FFFFFF" />
  </g>

  <!-- RIGHT HEMISPHERE: ACOUSTIC SPEECH WAVEFORMS (VOICE BIOMARKERS) -->
  <g filter="url(#glow)">
    <!-- Waveform Bar 1 (Center-Left Transition) -->
    <rect x="254" y="210" width="16" height="92" rx="8" fill="url(#waveGrad1)" />
    
    <!-- Waveform Bar 2 -->
    <rect x="282" y="170" width="18" height="172" rx="9" fill="url(#waveGrad2)" />
    
    <!-- Waveform Bar 3 (Peak Acoustic Energy) -->
    <rect x="312" y="136" width="20" height="240" rx="10" fill="url(#waveGrad3)" />
    
    <!-- Waveform Bar 4 -->
    <rect x="344" y="166" width="18" height="180" rx="9" fill="url(#waveGrad2)" />
    
    <!-- Waveform Bar 5 -->
    <rect x="374" y="206" width="16" height="100" rx="8" fill="url(#waveGrad1)" />
  </g>

  <!-- CENTER FUSION CORE (DUAL-MODALITY BRIDGE) -->
  <circle cx="256" cy="256" r="28" fill="url(#sparkGrad)" />
  <circle cx="256" cy="256" r="8" fill="#FFFFFF" />
</svg>
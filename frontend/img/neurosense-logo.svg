<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- iOS Dark Mesh Background Gradient -->
    <linearGradient id="iosBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="40%" stop-color="#11192E" />
      <stop offset="80%" stop-color="#1A153B" />
      <stop offset="100%" stop-color="#22123E" />
    </linearGradient>

    <!-- iOS Top Rim Glass Stroke -->
    <linearGradient id="iosRimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.38" />
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.03" />
    </linearGradient>

    <!-- Upper Glass Sheen Reflection -->
    <linearGradient id="glassSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>

    <!-- Apple Intelligence / Siri Fluid Ribbons -->
    <linearGradient id="siriCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <linearGradient id="siriPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF416C" />
      <stop offset="100%" stop-color="#8A2387" />
    </linearGradient>

    <linearGradient id="siriPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D946EF" />
      <stop offset="50%" stop-color="#9B51E0" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <!-- Soundwave Pill Gradients -->
    <linearGradient id="pillGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <linearGradient id="pillGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#8A2387" />
    </linearGradient>

    <linearGradient id="pillGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF61D2" />
      <stop offset="100%" stop-color="#FE5196" />
    </linearGradient>

    <!-- Center AI Core Glow -->
    <radialGradient id="aiSpark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#00F2FE" />
      <stop offset="70%" stop-color="#9B51E0" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#9B51E0" stop-opacity="0" />
    </radialGradient>

    <!-- High-Contrast Outer Glow for iOS Depth -->
    <filter id="iosGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="20" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- iOS App Icon Superellipse Full Bleed Background (512x512 with exact 116px radius) -->
  <rect x="0" y="0" width="512" height="512" rx="116" ry="116" fill="url(#iosBgGrad)" />

  <!-- Subtle Neural Infinity Ring Background Halo -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#siriPurple)" stroke-opacity="0.14" stroke-width="3" stroke-dasharray="12 12" />
  <circle cx="256" cy="256" r="105" fill="none" stroke="#00F2FE" stroke-opacity="0.08" stroke-width="1.5" />

  <!-- EMBLEM: APPLE INTELLIGENCE STYLE DUAL-MODALITY LOOP & SOUNDWAVE -->
  <g filter="url(#iosGlow)">
    
    <!-- LEFT SIDE: iOS Siri / Cognitive Neural Fluid Ribbon Loops -->
    <!-- Bold curved organic pathways representing cognitive neural structure -->
    <path d="M 170 150 C 120 200, 120 310, 170 360 C 200 390, 240 370, 256 340" fill="none" stroke="url(#siriCyan)" stroke-width="18" stroke-linecap="round" />
    <path d="M 200 130 C 145 185, 150 280, 210 335" fill="none" stroke="url(#siriPink)" stroke-width="12" stroke-linecap="round" stroke-opacity="0.9" />
    <path d="M 230 145 C 180 190, 190 270, 235 305" fill="none" stroke="url(#siriPurple)" stroke-width="8" stroke-linecap="round" stroke-opacity="0.8" />
    
    <!-- Bold Neural Nodes (Siri Glowing Orbs) -->
    <circle cx="170" cy="150" r="14" fill="#00F2FE" />
    <circle cx="170" cy="150" r="6" fill="#FFFFFF" />

    <circle cx="140" cy="256" r="16" fill="#D946EF" />
    <circle cx="140" cy="256" r="7" fill="#FFFFFF" />

    <circle cx="170" cy="360" r="14" fill="#4FACFE" />
    <circle cx="170" cy="360" r="6" fill="#FFFFFF" />

    <circle cx="210" cy="335" r="11" fill="#FF61D2" />
    <circle cx="210" cy="335" r="4.5" fill="#FFFFFF" />

    <!-- RIGHT SIDE: iOS Voice Memos / Soundwave Precision Bars (High Contrast) -->
    <!-- Soundwave Bar 1 (Left-Center Transition) -->
    <rect x="252" y="212" width="20" height="88" rx="10" fill="url(#pillGrad1)" />
    
    <!-- Soundwave Bar 2 -->
    <rect x="286" y="164" width="22" height="184" rx="11" fill="url(#pillGrad2)" />
    
    <!-- Soundwave Bar 3 (Main Peak Energy Bar) -->
    <rect x="320" y="120" width="24" height="272" rx="12" fill="url(#pillGrad3)" />
    
    <!-- Soundwave Bar 4 -->
    <rect x="358" y="156" width="22" height="200" rx="11" fill="url(#pillGrad2)" />
    
    <!-- Soundwave Bar 5 -->
    <rect x="394" y="202" width="20" height="108" rx="10" fill="url(#pillGrad1)" />
  </g>

  <!-- CENTER AI FUSION CORE (APPLE INTELLIGENCE SPARK) -->
  <circle cx="256" cy="256" r="42" fill="url(#aiSpark)" />
  <circle cx="256" cy="256" r="14" fill="#FFFFFF" filter="drop-shadow(0 0 8px #00F2FE)" />

  <!-- iOS App Icon Glass Sheen Overlay (Top Half Reflection) -->
  <path d="M 0 0 L 512 0 L 512 220 Q 256 260 0 220 Z" fill="url(#glassSheen)" clip-path="inset(0 0 0 0 round 116px)" pointer-events="none" />

  <!-- iOS Glass Rim Border Highlight (1.5px inside) -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="114.5" ry="114.5" fill="none" stroke="url(#iosRimGrad)" stroke-width="3" pointer-events="none" />
</svg>